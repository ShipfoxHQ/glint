services:
  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_USER: "glint"
      POSTGRES_PASSWORD: "local-glint"
      PGDATA: "/data/postgres"
    volumes:
      - postgres:/data/postgres
      - ./dev/postgres/init.sql:/docker-entrypoint-initdb.d/glint_postgres_init.sql
    ports:
      - 127.0.0.1:${GLINT_POSTGRES_PORT:-5432}:5432
    restart: unless-stopped
    healthcheck:
      test: [CMD, pg_isready, -U, glint, -d, glint]
      interval: 5s
      timeout: 2s
      retries: 5

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: "local-glint"
      MINIO_ROOT_PASSWORD: "local-glint-secret"
    volumes:
      - minio:/data
    ports:
      - 127.0.0.1:${GLINT_MINIO_PORT:-9000}:9000
      - 127.0.0.1:${GLINT_MINIO_CONSOLE_PORT:-9001}:9001
    restart: unless-stopped
    healthcheck:
      test: [CMD, mc, ready, local]
      interval: 5s
      timeout: 2s
      retries: 10

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mc alias set local http://minio:9000 local-glint local-glint-secret
        mc mb --ignore-existing local/glint
    restart: "no"

  queue:
    image: softwaremill/elasticmq-native:1.7.1
    volumes:
      - elasticmq:/data
      - ./dev/elasticmq.conf:/opt/elasticmq.conf:ro
    ports:
      - 127.0.0.1:${GLINT_QUEUE_PORT:-9324}:9324
    restart: unless-stopped

volumes:
  elasticmq:
  minio:
  postgres:
