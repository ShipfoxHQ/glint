strictPeerDependencies: true
dedupePeerDependents: true
nodeLinker: isolated
minimumReleaseAge: 2880
minimumReleaseAgeExclude:
  - '@shipfox/*'
allowBuilds:
  '@swc/core': true
  esbuild: true
  protobufjs: true
  sharp: true

packages:
  - "apps/*"
  - "e2e/**"
  - "libs/**"
  - "tools/**"
  - "!**/node_modules/**"
