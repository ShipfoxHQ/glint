"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
setup = """
mise trust
mise install
mise run bootstrap
"""
archive = "mise run local:reset"
run_mode = "concurrent"

[scripts.run.dev]
command = "mise run local:start"
default = true
icon = "play"

[scripts.run.test]
command = "mise run local:test"
icon = "test-tube"
